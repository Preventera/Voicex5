<!DOCTYPE html>
<html lang="fr-CA">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SafeTalkX5 — Causeries SST Vocales</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['"DM Sans"', 'system-ui', 'sans-serif'] },
          colors: {
            st: { bg: '#0a0f1a', card: '#111827', accent: '#f97316', blue: '#3b82f6', surface: '#1f2937' }
          }
        }
      }
    };
  </script>
  <style>
    body { background: #0a0f1a; color: #e2e8f0; font-family: 'DM Sans', system-ui, sans-serif; margin: 0; }
    @keyframes fade-in { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .fade-in { animation: fade-in .4s ease-out; }
    @keyframes pulse-accent { 0%,100%{box-shadow:0 0 0 0 rgba(249,115,22,.4)} 50%{box-shadow:0 0 0 12px rgba(249,115,22,0)} }
    .pulse-accent { animation: pulse-accent 2s ease-in-out infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .spin { animation: spin .8s linear infinite; }
    ::-webkit-scrollbar { width:6px } ::-webkit-scrollbar-track { background:#111827 } ::-webkit-scrollbar-thumb { background:#374151; border-radius:3px }
    .timeline-line { position:absolute; left:19px; top:0; bottom:0; width:2px; background:#1f2937; }
    .section-active .timeline-dot { background:#f97316 !important; box-shadow:0 0 0 4px rgba(249,115,22,.3); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const API_BASE = "http://localhost:8003";
    const WS_BASE = "ws://localhost:8003";
    const PLAYBACK_RATE = 24000;

    const { useState, useEffect, useRef, useCallback } = React;

    const PRINCIPE_META = {
      tension:      { icon: "\uD83D\uDD34", label: "Tension", color: "#ef4444" },
      humain:       { icon: "\uD83D\uDC64", label: "Humain", color: "#8b5cf6" },
      image:        { icon: "\uD83C\uDFAC", label: "Image", color: "#06b6d4" },
      pour_toi:     { icon: "\uD83C\uDFAF", label: "Pour toi", color: "#f97316" },
      enjeux:       { icon: "\u26A0\uFE0F", label: "Enjeux", color: "#eab308" },
      boucle:       { icon: "\uD83D\uDD04", label: "Boucle", color: "#10b981" },
      decision:     { icon: "\u2705",       label: "Decision", color: "#22c55e" },
      epilogue_ia:  { icon: "\uD83E\uDD16", label: "Epilogue IA", color: "#3b82f6" },
    };

    // ============================================================
    // AUDIO ENGINE (reused from voice-quiz-demo)
    // ============================================================
    class AudioEngine {
      constructor() { this.ctx = null; this.queue = []; this.playing = false; }
      enqueue(pcm16Buf) { this.queue.push(pcm16Buf); if (!this.playing) this._next(); }
      async _next() {
        if (!this.queue.length) { this.playing = false; return; }
        this.playing = true;
        if (!this.ctx) this.ctx = new AudioContext({ sampleRate: PLAYBACK_RATE });
        const raw = this.queue.shift();
        const i16 = new Int16Array(raw);
        const f32 = new Float32Array(i16.length);
        for (let i = 0; i < i16.length; i++) f32[i] = i16[i] / 0x8000;
        const buf = this.ctx.createBuffer(1, f32.length, PLAYBACK_RATE);
        buf.getChannelData(0).set(f32);
        const src = this.ctx.createBufferSource();
        src.buffer = buf; src.connect(this.ctx.destination);
        src.onended = () => this._next(); src.start();
      }
      stop() { this.queue = []; this.playing = false; }
    }

    // ============================================================
    // ICONS
    // ============================================================
    const SpinnerSVG = ({size=20}) => (
      <svg className="spin" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <path d="M12 2v4"/><path d="M12 18v4" opacity=".3"/><path d="M4.93 4.93l2.83 2.83"/><path d="M16.24 16.24l2.83 2.83" opacity=".3"/>
        <path d="M2 12h4"/><path d="M18 12h4" opacity=".3"/><path d="M4.93 19.07l2.83-2.83" opacity=".5"/><path d="M16.24 7.76l2.83-2.83" opacity=".5"/>
      </svg>
    );

    // ============================================================
    // SCREEN 1 — SELECTION
    // ============================================================
    function SelectionScreen({ onGenerate }) {
      const [sectors, setSectors] = useState([]);
      const [riskTypes, setRiskTypes] = useState([]);
      const [stats, setStats] = useState(null);
      const [secteur, setSecteur] = useState("");
      const [risk, setRisk] = useState("");
      const [mode, setMode] = useState("sst_pur");
      const [duree, setDuree] = useState(5);
      const [langue, setLangue] = useState("fr");
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);

      useEffect(() => {
        fetch(`${API_BASE}/api/safetalk/sectors`).then(r=>r.json()).then(d=>setSectors(d.sectors||[])).catch(()=>{});
        fetch(`${API_BASE}/api/safetalk/risk-types`).then(r=>r.json()).then(d=>setRiskTypes(d.risk_types||[])).catch(()=>{});
        fetch(`${API_BASE}/api/safetalk/stats`).then(r=>r.json()).then(d=>setStats(d)).catch(()=>{});
      }, []);

      const handleGenerate = async () => {
        setLoading(true); setError(null);
        try {
          const resp = await fetch(`${API_BASE}/api/safetalk/generate`, {
            method: "POST", headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ secteur_scian: secteur || undefined, risk_type: risk || undefined, mode, duree_minutes: duree, langue, source: "auto", role_animateur: "superviseur" }),
          });
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const talk = await resp.json();
          if (talk.error) throw new Error(talk.error);
          onGenerate(talk);
        } catch(e) { setError(e.message); }
        finally { setLoading(false); }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="max-w-xl w-full fade-in space-y-5">
            {/* Header */}
            <div className="text-center mb-2">
              <div className="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-st-accent/20 mb-3">
                <span className="text-3xl">{"\uD83C\uDFA4"}</span>
              </div>
              <h1 className="text-3xl font-bold">SafeTalk<span className="text-st-accent">X5</span></h1>
              <p className="text-slate-400 text-sm mt-2 max-w-md mx-auto leading-relaxed">
                Chaque accident a une histoire. Raconte-la avant qu'elle se repete.
              </p>
            </div>

            {/* Form */}
            <div className="bg-st-card rounded-2xl p-5 border border-gray-800 space-y-4">
              {/* Secteur */}
              <div>
                <label className="block text-sm text-slate-400 mb-1.5">Secteur SCIAN</label>
                <select value={secteur} onChange={e=>setSecteur(e.target.value)}
                  className="w-full px-4 py-2.5 rounded-lg bg-st-bg border border-gray-700 text-white focus:border-st-accent focus:outline-none transition">
                  <option value="">Tous les secteurs</option>
                  {sectors.map(s => <option key={s.code} value={s.code}>{s.nom} ({s.nb_incidents})</option>)}
                </select>
              </div>

              {/* Risque */}
              <div>
                <label className="block text-sm text-slate-400 mb-1.5">Type de risque</label>
                <select value={risk} onChange={e=>setRisk(e.target.value)}
                  className="w-full px-4 py-2.5 rounded-lg bg-st-bg border border-gray-700 text-white focus:border-st-accent focus:outline-none transition">
                  <option value="">Tous les risques</option>
                  {riskTypes.filter(r=>r.available).map(r => <option key={r.type} value={r.type}>{r.label} ({r.count})</option>)}
                </select>
              </div>

              {/* Mode */}
              <div>
                <label className="block text-sm text-slate-400 mb-2">Mode</label>
                <div className="grid grid-cols-2 gap-3">
                  <button onClick={()=>setMode("sst_pur")}
                    className={`p-3 rounded-xl border text-left transition ${mode==="sst_pur" ? "border-st-accent bg-st-accent/10" : "border-gray-700 bg-st-bg hover:border-gray-600"}`}>
                    <span className="text-lg">{"\uD83E\uDDBA"}</span>
                    <p className="text-sm font-semibold mt-1">SST Pur</p>
                    <p className="text-xs text-slate-500">Accident reel, storytelling terrain</p>
                  </button>
                  <button onClick={()=>setMode("ia_sst")}
                    className={`p-3 rounded-xl border text-left transition ${mode==="ia_sst" ? "border-st-blue bg-st-blue/10" : "border-gray-700 bg-st-bg hover:border-gray-600"}`}>
                    <span className="text-lg">{"\uD83E\uDD16"}</span>
                    <p className="text-sm font-semibold mt-1">IA x SST</p>
                    <p className="text-xs text-slate-500">+ comment l'IA aurait prevenu</p>
                  </button>
                </div>
              </div>

              {/* Duree + Langue */}
              <div className="flex gap-4">
                <div className="flex-1">
                  <label className="block text-sm text-slate-400 mb-2">Duree</label>
                  <div className="flex gap-2">
                    {[5,7,10].map(d => (
                      <button key={d} onClick={()=>setDuree(d)}
                        className={`flex-1 py-2 rounded-lg text-sm font-medium transition ${duree===d ? "bg-st-accent text-white" : "bg-st-bg border border-gray-700 text-slate-400 hover:border-gray-600"}`}>
                        {d} min
                      </button>
                    ))}
                  </div>
                </div>
                <div className="w-28">
                  <label className="block text-sm text-slate-400 mb-2">Langue</label>
                  <div className="flex gap-2">
                    {["fr","en"].map(l => (
                      <button key={l} onClick={()=>setLangue(l)}
                        className={`flex-1 py-2 rounded-lg text-sm font-medium transition ${langue===l ? "bg-st-accent text-white" : "bg-st-bg border border-gray-700 text-slate-400 hover:border-gray-600"}`}>
                        {l.toUpperCase()}
                      </button>
                    ))}
                  </div>
                </div>
              </div>

              {/* Error */}
              {error && <p className="text-red-400 text-sm text-center">{error}</p>}

              {/* Generate */}
              <button onClick={handleGenerate} disabled={loading}
                className="w-full py-3.5 rounded-xl bg-st-accent text-white font-bold text-lg hover:bg-orange-600 disabled:opacity-50 transition flex items-center justify-center gap-2">
                {loading ? <><SpinnerSVG size={22}/> Generation en cours...</> : <><span>{"\uD83C\uDFA4"}</span> Generer ma causerie</>}
              </button>
            </div>

            {/* Stats */}
            {stats && (
              <p className="text-center text-xs text-slate-600">
                {stats.cnesst_records} incidents analyses &middot; {stats.sectors_available} secteurs &middot; {stats.risk_types_available} types de risques
              </p>
            )}
          </div>
        </div>
      );
    }

    // ============================================================
    // AUDIO ENGINE — capture micro + playback (from voice-quiz-demo)
    // ============================================================
    const SAMPLE_RATE = 16000;
    class MicCapture {
      constructor(onChunk) {
        this.onChunk = onChunk; this.stream = null; this.ctx = null; this.src = null; this.proc = null;
      }
      async start() {
        this.stream = await navigator.mediaDevices.getUserMedia({ audio: { sampleRate: SAMPLE_RATE, channelCount: 1, echoCancellation: true, noiseSuppression: true } });
        this.ctx = new AudioContext({ sampleRate: SAMPLE_RATE });
        this.src = this.ctx.createMediaStreamSource(this.stream);
        this.proc = this.ctx.createScriptProcessor(4096, 1, 1);
        this.proc.onaudioprocess = (e) => {
          const f32 = e.inputBuffer.getChannelData(0);
          const i16 = new Int16Array(f32.length);
          for (let i = 0; i < f32.length; i++) { const s = Math.max(-1, Math.min(1, f32[i])); i16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF; }
          this.onChunk(i16.buffer);
        };
        this.src.connect(this.proc); this.proc.connect(this.ctx.destination);
      }
      stop() {
        if (this.proc) { this.proc.disconnect(); this.proc = null; }
        if (this.src) { this.src.disconnect(); this.src = null; }
        if (this.ctx) { this.ctx.close(); this.ctx = null; }
        if (this.stream) { this.stream.getTracks().forEach(t => t.stop()); this.stream = null; }
      }
    }

    // Phase definitions
    const PHASES = [
      { id: 1, nom: "Accroche", icon: "\u{1F3AF}", duree: "2 min" },
      { id: 2, nom: "L'histoire", icon: "\u{1F4D6}", duree: "5 min" },
      { id: 3, nom: "Enjeux", icon: "\u26A0\uFE0F", duree: "3 min" },
      { id: 4, nom: "Actions", icon: "\u2705", duree: "3 min" },
      { id: 5, nom: "Cl\u00F4ture", icon: "\u{1F3C1}", duree: "2 min" },
    ];

    const fmtTime = (s) => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

    // ============================================================
    // SCREEN 2 — LIVE INTERACTIVE SESSION
    // ============================================================
    function LiveTalkScreen({ talk, onBack, onRestart }) {
      const [sessionStarted, setSessionStarted] = useState(false);
      const [isGeminiSpeaking, setIsGeminiSpeaking] = useState(false);
      const [elapsed, setElapsed] = useState(0);
      const [transcripts, setTranscripts] = useState([]);
      const [error, setError] = useState(null);
      const [currentPhase, setCurrentPhase] = useState(0);

      const wsRef = useRef(null);
      const micRef = useRef(null);
      const audioRef = useRef(new AudioEngine());
      const timerRef = useRef(null);
      const bottomRef = useRef(null);

      useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [transcripts]);

      // Timer
      useEffect(() => {
        if (sessionStarted) {
          timerRef.current = setInterval(() => setElapsed(e => e + 1), 1000);
          return () => clearInterval(timerRef.current);
        }
      }, [sessionStarted]);

      // Phase estimation by elapsed time
      useEffect(() => {
        if (elapsed < 120) setCurrentPhase(0);
        else if (elapsed < 420) setCurrentPhase(1);
        else if (elapsed < 600) setCurrentPhase(2);
        else if (elapsed < 780) setCurrentPhase(3);
        else setCurrentPhase(4);
      }, [elapsed]);

      const cleanup = useCallback(() => {
        clearInterval(timerRef.current);
        if (wsRef.current) { try { wsRef.current.close(); } catch(e){} wsRef.current = null; }
        if (micRef.current) { micRef.current.stop(); micRef.current = null; }
        audioRef.current.stop();
      }, []);

      useEffect(() => () => cleanup(), []);

      const handleStart = async () => {
        setError(null);
        try {
          // Start mic capture
          const mic = new MicCapture((chunk) => {
            if (wsRef.current?.readyState === WebSocket.OPEN) wsRef.current.send(chunk);
          });
          await mic.start();
          micRef.current = mic;

          // Open WebSocket
          const ws = new WebSocket(`${WS_BASE}/ws/safetalk/live`);
          wsRef.current = ws;

          ws.onopen = () => {
            ws.send(JSON.stringify({ talk_id: talk.talk_id }));
          };

          ws.onmessage = (evt) => {
            if (evt.data instanceof Blob) {
              setIsGeminiSpeaking(true);
              evt.data.arrayBuffer().then(buf => audioRef.current.enqueue(buf));
              return;
            }
            try {
              const msg = JSON.parse(evt.data);
              if (msg.type === "session_started") setSessionStarted(true);
              if (msg.type === "transcript") {
                setIsGeminiSpeaking(false);
                setTranscripts(prev => {
                  if (prev.length > 0 && prev[prev.length-1].role === 'animateur') {
                    const u = [...prev]; u[u.length-1] = { ...u[u.length-1], text: u[u.length-1].text + msg.text }; return u;
                  }
                  return [...prev, { role: 'animateur', text: msg.text }];
                });
              }
              if (msg.type === "turn_complete") {
                setIsGeminiSpeaking(false);
                setTranscripts(prev => [...prev, { role: 'participant', text: '(\u00E9coute...)' }]);
              }
              if (msg.type === "error") { setError(msg.message); }
            } catch(e) {}
          };

          ws.onerror = () => setError("Erreur WebSocket. V\u00E9rifiez que le serveur tourne.");
          ws.onclose = () => setSessionStarted(false);
          setSessionStarted(true);

        } catch(err) {
          if (err.name === 'NotAllowedError') setError("Acc\u00E8s au microphone refus\u00E9.");
          else setError("Erreur: " + err.message);
        }
      };

      const handleStop = () => { cleanup(); setSessionStarted(false); };

      const handleCopy = () => {
        const sections = talk.sections || [];
        const text = sections.map(s => `[${s.principe?.toUpperCase()}]\n${s.texte}`).join("\n\n");
        navigator.clipboard.writeText(text).catch(()=>{});
      };

      const titre = talk.titre || "Causerie SST";
      const secteur = talk.secteur || "";

      return (
        <div className="min-h-screen p-4 max-w-2xl mx-auto fade-in">
          {/* Header */}
          <div className="flex items-center justify-between mb-4">
            <div>
              <button onClick={() => { handleStop(); onBack(); }} className="text-slate-500 hover:text-slate-300 text-sm mb-1 flex items-center gap-1">&larr; Retour</button>
              <h2 className="text-lg font-bold">{titre}</h2>
              <div className="flex gap-2 mt-1 text-xs text-slate-500">
                <span className="px-2 py-0.5 rounded bg-st-surface">{secteur}</span>
                <span className="px-2 py-0.5 rounded bg-st-surface">10-15 min</span>
              </div>
            </div>
            <div className="text-right">
              <p className="text-sm font-mono text-slate-300">{fmtTime(elapsed)}</p>
            </div>
          </div>

          {/* Phase dots */}
          <div className="flex items-center justify-center gap-2 mb-4">
            {PHASES.map((p, i) => (
              <div key={i} className="flex items-center gap-1.5">
                <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm transition-all ${
                  i === currentPhase ? "bg-st-accent text-white ring-2 ring-st-accent/40" :
                  i < currentPhase ? "bg-green-600/30 text-green-400" : "bg-st-surface text-slate-600"
                }`}>{p.icon}</div>
                {i < 4 && <div className={`w-6 h-0.5 ${i < currentPhase ? "bg-green-600" : "bg-gray-700"}`}/>}
              </div>
            ))}
          </div>
          <p className="text-center text-xs text-slate-500 mb-4">
            Phase {currentPhase + 1}/5 — {PHASES[currentPhase]?.nom} ({PHASES[currentPhase]?.duree})
          </p>

          {/* Start button or mic indicator */}
          {!sessionStarted ? (
            <div className="text-center my-8">
              <button onClick={handleStart}
                className="py-4 px-8 rounded-2xl bg-st-accent text-white font-bold text-lg hover:bg-orange-600 transition pulse-accent flex items-center justify-center gap-3 mx-auto">
                <span className="text-2xl">{"\uD83C\uDFA4"}</span> D\u00E9marrer la causerie live
              </button>
              <p className="text-xs text-slate-500 mt-3">Microphone requis — Gemini anime la causerie</p>
              {error && <p className="text-red-400 text-sm mt-2">{error}</p>}
            </div>
          ) : (
            <>
              {/* Mic / speaker indicator */}
              <div className="flex justify-center my-4">
                <div className={`w-16 h-16 rounded-full flex items-center justify-center transition-all ${
                  isGeminiSpeaking ? "bg-st-accent/20 text-st-accent speak-pulse" : "bg-green-600/20 text-green-400 pulse-accent"
                }`}>
                  {isGeminiSpeaking
                    ? <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                    : <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                  }
                </div>
              </div>
              <p className="text-center text-sm mb-3 font-medium" style={{color: isGeminiSpeaking ? '#f97316' : '#22c55e'}}>
                {isGeminiSpeaking ? "L'animateur parle..." : "\u00C0 vous de r\u00E9pondre..."}
              </p>

              {/* Transcript */}
              <div className="bg-st-card rounded-xl border border-gray-800 p-4 overflow-y-auto mb-4" style={{maxHeight:'300px',minHeight:'150px'}}>
                {transcripts.length === 0 && <p className="text-slate-500 text-sm italic">L'animateur va commencer...</p>}
                {transcripts.map((t, i) => (
                  <div key={i} className={`mb-2 text-sm ${t.role === 'animateur' ? 'text-slate-200' : 'text-green-400'}`}>
                    <span className="text-xs text-slate-500 mr-2">{t.role === 'animateur' ? 'Animateur' : 'Participant'}</span>
                    <span>{t.text}</span>
                  </div>
                ))}
                <div ref={bottomRef}/>
              </div>

              {/* Controls */}
              <div className="flex gap-2">
                <button onClick={handleStop}
                  className="flex-1 py-2.5 rounded-xl border border-red-800 text-red-400 hover:bg-red-900/20 transition flex items-center justify-center gap-2 text-sm">
                  {"\u23F9"} Terminer la causerie
                </button>
                <button onClick={handleCopy}
                  className="py-2.5 px-4 rounded-xl border border-gray-700 text-slate-400 hover:bg-st-surface transition text-sm">
                  {"\uD83D\uDCCB"} Copier
                </button>
              </div>
              {error && <p className="text-red-400 text-sm text-center mt-2">{error}</p>}
            </>
          )}

          {/* Summary footer (always visible) */}
          <div className="mt-6">
            <SummarySection talk={talk} onRestart={() => { handleStop(); onRestart(); }} onCopy={handleCopy} />
          </div>
        </div>
      );
    }

    // ============================================================
    // SUMMARY SECTION
    // ============================================================
    function SummarySection({ talk, onRestart, onCopy }) {
      return (
        <div className="space-y-4 pb-8">
          {talk.reflexe_du_jour && (
            <div className="bg-st-accent/10 border border-st-accent/30 rounded-xl p-4 text-center">
              <p className="text-xs text-st-accent uppercase tracking-wider mb-1">R\u00E9flexe du jour</p>
              <p className="text-lg font-bold text-st-accent">{talk.reflexe_du_jour}</p>
            </div>
          )}
          {talk.references_reglementaires?.length > 0 && (
            <div className="bg-st-card rounded-xl border border-gray-800 p-4">
              <p className="text-xs text-slate-500 uppercase tracking-wider mb-2">R\u00E9f\u00E9rences r\u00E9glementaires</p>
              <ul className="space-y-1">
                {talk.references_reglementaires.map((r,i) => (
                  <li key={i} className="text-xs text-slate-400 flex items-start gap-1.5">
                    <span className="text-slate-600 mt-0.5">{"\u00A7"}</span> {r}
                  </li>
                ))}
              </ul>
            </div>
          )}
          <div className="flex items-center justify-between text-xs text-slate-600 px-1">
            <span>Source : {talk.source_incident || "anonymis\u00E9"}</span>
            {talk.generation_time_s && <span>G\u00E9n\u00E9r\u00E9 en {talk.generation_time_s}s</span>}
          </div>
          <div className="grid grid-cols-2 gap-2">
            <button onClick={onCopy}
              className="py-2.5 rounded-xl border border-gray-700 text-slate-400 hover:bg-st-surface transition text-sm flex items-center justify-center gap-1">
              {"\uD83D\uDCCB"} Copier le texte
            </button>
            <button onClick={onRestart}
              className="py-2.5 rounded-xl bg-st-accent/10 border border-st-accent/30 text-st-accent hover:bg-st-accent/20 transition text-sm flex items-center justify-center gap-1">
              {"\uD83D\uDD04"} Nouvelle causerie
            </button>
          </div>
        </div>
      );
    }

    // ============================================================
    // APP
    // ============================================================
    function App() {
      const [screen, setScreen] = useState("select");
      const [talk, setTalk] = useState(null);

      return (
        <div className="min-h-screen">
          {screen === "select" && (
            <SelectionScreen onGenerate={(t) => { setTalk(t); setScreen("talk"); }} />
          )}
          {screen === "talk" && talk && (
            <LiveTalkScreen
              talk={talk}
              onBack={() => setScreen("select")}
              onRestart={() => { setTalk(null); setScreen("select"); }}
            />
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
