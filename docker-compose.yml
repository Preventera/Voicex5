# ============================================================
# VoiceX5 - Docker Compose
# Agents Vocaux SST Intelligents
# Preventera / GenAISafety
# ============================================================

version: '3.8'

services:
  # ============================================================
  # CORE: VoiceX5 API Gateway
  # ============================================================
  
  voicex5-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voicex5-api
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-voicex5secure123}
      - QDRANT_URL=http://qdrant:6333
      - TTS_ENDPOINT=http://orpheus:8080
      - REDIS_URL=redis://redis:6379/0
      - STT_MODEL=${STT_MODEL:-large-v3}
      - STT_LANGUAGE=${STT_LANGUAGE:-fr}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./src:/app/src:ro
      - ./config:/app/config:ro
      - voicex5_logs:/app/logs
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - voicex5-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================
  # TTS: Orpheus 3B via llama.cpp (GPU)
  # ============================================================
  
  orpheus:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: voicex5-tts
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models:ro
    command: >
      -m /models/orpheus-3b-0.1-ft-Q8_0.gguf
      -c 4096
      --host 0.0.0.0
      --port 8080
      -ngl 99
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - voicex5-network
    restart: unless-stopped
    profiles:
      - gpu

  # Version CPU (fallback)
  orpheus-cpu:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: voicex5-tts-cpu
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models:ro
    command: >
      -m /models/orpheus-3b-0.1-ft-Q8_0.gguf
      -c 2048
      --host 0.0.0.0
      --port 8080
      -t 4
    networks:
      - voicex5-network
    restart: unless-stopped
    profiles:
      - cpu

  # ============================================================
  # KNOWLEDGE GRAPH: Neo4j SafetyGraph
  # ============================================================
  
  neo4j:
    image: neo4j:5.15-community
    container_name: voicex5-neo4j
    ports:
      - "7474:7474"   # Browser
      - "7687:7687"   # Bolt
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-voicex5secure123}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_dbms_memory_pagecache_size=256m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./ontologies:/var/lib/neo4j/import:ro
      - ./scripts/neo4j-init.cypher:/var/lib/neo4j/import/init.cypher:ro
    networks:
      - voicex5-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ============================================================
  # VECTOR SEARCH: Qdrant
  # ============================================================
  
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: voicex5-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - voicex5-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # CACHE: Redis
  # ============================================================
  
  redis:
    image: redis:7-alpine
    container_name: voicex5-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - voicex5-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================================
  # OBSERVABILITY: Grafana + Prometheus
  # ============================================================
  
  grafana:
    image: grafana/grafana:10.2.3
    container_name: voicex5-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - voicex5-network
    restart: unless-stopped
    profiles:
      - monitoring

  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: voicex5-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - voicex5-network
    restart: unless-stopped
    profiles:
      - monitoring

  # ============================================================
  # GRADIO: Interface de test locale
  # ============================================================
  
  gradio:
    build:
      context: .
      dockerfile: Dockerfile.gradio
    container_name: voicex5-gradio
    ports:
      - "7860:7860"
    environment:
      - VOICEX5_API_URL=http://voicex5-api:8000
    depends_on:
      - voicex5-api
    networks:
      - voicex5-network
    restart: unless-stopped
    profiles:
      - dev

# ============================================================
# VOLUMES
# ============================================================

volumes:
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  qdrant_data:
    driver: local
  redis_data:
    driver: local
  grafana_data:
    driver: local
  prometheus_data:
    driver: local
  voicex5_logs:
    driver: local

# ============================================================
# NETWORKS
# ============================================================

networks:
  voicex5-network:
    driver: bridge
    name: voicex5-network
