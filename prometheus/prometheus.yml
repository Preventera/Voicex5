# ============================================================
# VoiceX5 - Prometheus Configuration
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # VoiceX5 API metrics
  - job_name: 'voicex5-api'
    static_configs:
      - targets: ['voicex5-api:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Neo4j metrics
  - job_name: 'neo4j'
    static_configs:
      - targets: ['neo4j:2004']
    scrape_interval: 30s

  # Redis metrics
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 30s
