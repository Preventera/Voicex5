apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Neo4j
    type: neo4j-datasource
    access: proxy
    url: bolt://neo4j:7687
    editable: false
    jsonData:
      database: neo4j
    secureJsonData:
      password: ${NEO4J_PASSWORD}
