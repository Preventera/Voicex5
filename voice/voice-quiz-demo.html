    // ============================================================
    // AUDIO ENGINE
    // ============================================================
    class AudioEngine {
      constructor(onChunk) {
        this.onChunk = onChunk;
        this.stream = null;
        this.audioCtx = null;
        this.sourceNode = null;
        this.processorNode = null;
        this.playbackCtx = null;
        this.playbackQueue = [];
        this.isPlaying = false;
      }

      async startCapture() {
        this.stream = await navigator.mediaDevices.getUserMedia({
          audio: { sampleRate: SAMPLE_RATE, channelCount: 1, echoCancellation: true, noiseSuppression: true }
        });
        this.audioCtx = new AudioContext({ sampleRate: SAMPLE_RATE });
        this.sourceNode = this.audioCtx.createMediaStreamSource(this.stream);
        this.processorNode = this.audioCtx.createScriptProcessor(4096, 1, 1);
        this.processorNode.onaudioprocess = (e) => {
          const float32 = e.inputBuffer.getChannelData(0);
          const pcm16 = new Int16Array(float32.length);
          for (let i = 0; i < float32.length; i++) {
            const s = Math.max(-1, Math.min(1, float32[i]));
            pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
          }
          this.onChunk(pcm16.buffer);
        };
        this.sourceNode.connect(this.processorNode);
        this.processorNode.connect(this.audioCtx.destination);
      }

      enqueuePlayback(pcm16ArrayBuffer) {
        this.playbackQueue.push(pcm16ArrayBuffer);
        if (!this.isPlaying) this._playNext();
      }

      async _playNext() {
        if (this.playbackQueue.length === 0) { this.isPlaying = false; return; }
        this.isPlaying = true;
        if (!this.playbackCtx) this.playbackCtx = new AudioContext({ sampleRate: PLAYBACK_RATE });
        const raw = this.playbackQueue.shift();
        const int16 = new Int16Array(raw);
        const float32 = new Float32Array(int16.length);
        for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 0x8000;
        const buf = this.playbackCtx.createBuffer(1, float32.length, PLAYBACK_RATE);
        buf.getChannelData(0).set(float32);
        const src = this.playbackCtx.createBufferSource();
        src.buffer = buf;
        src.connect(this.playbackCtx.destination);
        src.onended = () => this._playNext();
        src.start();
      }

      stop() {
        if (this.processorNode) { this.processorNode.disconnect(); this.processorNode = null; }
        if (this.sourceNode) { this.sourceNode.disconnect(); this.sourceNode = null; }
        if (this.audioCtx) { this.audioCtx.close(); this.audioCtx = null; }
        if (this.stream) { this.stream.getTracks().forEach(t => t.stop()); this.stream = null; }
        this.playbackQueue = [];
      }
    }

    // ============================================================

    // ============================================================

                <label className="block text-sm text-slate-400 mb-1.5">Identifiant utilisateur</label>
                <input
                  type="text" value={userId} onChange={e=>setUserId(e.target.value)}
                  placeholder="ex: marie.tremblay@entreprise.ca"
                  className="w-full px-4 py-2.5 rounded-lg bg-ax5-bg border border-slate-600 text-white placeholder-slate-500 focus:border-ax5-accent focus:outline-none transition"

                <MicIcon size={20}/> Demarrer le Quiz Vocal
              </button>
              <p className="text-xs text-slate-500 text-center">Assurez-vous d'avoir un microphone fonctionnel</p>
            </div>
          </div>

          {showConsent && (
            <ConsentModal
              onAccept={() => { setShowConsent(false); onStart(userId.trim(), language); }}
              onDecline={() => setShowConsent(false)}
            />
          )}
        </div>
      );

    // ============================================================
    // SCORE BADGE (animated notification)
    // ============================================================
    function ScoreBadge({ questionNum, visible }) {
      if (!visible || questionNum <= 0) return null;
      return (
        <div className="badge-anim flex items-center gap-2 bg-ax5-success/15 border border-ax5-success/30 text-ax5-success px-4 py-2 rounded-lg text-sm font-medium">
          <CheckCircleIcon size={16}/>
          <span>Question {questionNum} scoree</span>
        </div>
      );
    }

    // ============================================================
    // QUIZ SCREEN
    // ============================================================
    function QuizScreen({ sessionId, transcripts, questionNum, currentAxe, currentQuestionId, elapsed, isGeminiSpeaking, isPaused, scoreBadgeVisible, onPause, onStop }) {
      const bottomRef = useRef(null);
      useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:'smooth' }); }, [transcripts]);

      const pct = Math.round((questionNum / 18) * 100);
      const nextQIdx = Math.min(questionNum, 17);
      const nextQId = QUESTION_IDS[nextQIdx];
      const questionText = QUIZ_QUESTIONS_TEXT[currentQuestionId || nextQId] || "";

      return (
        <div className="min-h-screen flex flex-col p-4 max-w-2xl mx-auto fade-in">
          {/* Header */}
          <div className="flex items-center justify-between mb-3">
            <div>
              <h2 className="text-lg font-semibold">Quiz Radar Vocal</h2>
              <p className="text-xs text-slate-500">Session: {sessionId?.substring(0,8)}...</p>
            </div>
            <div className="text-right">
              <p className="text-sm font-mono text-slate-300">{fmtTime(elapsed)}</p>
            </div>
          </div>

          {/* Progress */}
          <div className="mb-3">
            <div className="flex justify-between text-sm mb-1">
              <span className="text-slate-400 font-medium">Question {Math.min(questionNum + 1, 18)}/18</span>
              <span className="text-ax5-accent font-medium">{currentAxe}</span>
            </div>
            <div className="h-2 bg-ax5-bg rounded-full overflow-hidden">
              <div className="h-full bg-ax5-accent rounded-full transition-all duration-500" style={{width:`${pct}%`}}/>
            </div>
          </div>

          {/* Score badge */}
          <div className="flex justify-center mb-2" style={{minHeight: 36}}>
            <ScoreBadge questionNum={questionNum} visible={scoreBadgeVisible} />
          </div>

          {/* Current question text */}
          {questionText && (
            <div className="bg-ax5-bg/50 border border-slate-700/50 rounded-xl px-4 py-3 mb-3">
              <p className="text-xs text-slate-500 mb-1 uppercase tracking-wider">Question en cours</p>
              <p className="text-sm text-slate-300 leading-relaxed">{questionText}</p>
            </div>
          )}

          {/* Mic indicator */}
          <div className="flex justify-center my-4">
            <div className={`w-20 h-20 rounded-full flex items-center justify-center transition-all duration-300 ${
              isGeminiSpeaking
                ? 'bg-slate-700/60 text-slate-400 speak-pulse'
                : isPaused
                  ? 'bg-slate-700 text-slate-500'
                  : 'bg-ax5-success/20 text-ax5-success mic-pulse-green'
            }`}>
              {isGeminiSpeaking ? <SpeakerIcon size={36}/> : <MicIcon size={36}/>}
            </div>
          </div>
          <p className="text-center text-sm mb-3 font-medium" style={{color: isGeminiSpeaking ? '#94a3b8' : isPaused ? '#64748b' : '#10b981'}}>
            {isGeminiSpeaking ? "L'assistant parle..." : isPaused ? "En pause" : "A vous de parler..."}
          </p>

          {/* Transcript */}
          <div className="flex-1 bg-ax5-card rounded-xl border border-slate-700 p-4 overflow-y-auto mb-4" style={{maxHeight:'280px',minHeight:'160px'}}>
            {transcripts.length === 0 && <p className="text-slate-500 text-sm italic">L'assistant va vous accueillir...</p>}
            {transcripts.map((t, i) => (
              <div key={i} className={`mb-3 text-sm ${t.role === 'gemini' ? 'text-slate-200' : 'text-ax5-success'}`}>
                <span className="text-xs text-slate-500 mr-2">{t.role === 'gemini' ? 'Assistant' : 'Vous'}</span>
                <span>{t.text}</span>
              </div>
            ))}
            <div ref={bottomRef}/>
          </div>

          {/* Controls */}
          <div className="flex gap-3">
            <button onClick={onPause}
              className="flex-1 py-2.5 rounded-lg border border-slate-600 text-slate-300 hover:bg-slate-700 transition flex items-center justify-center gap-2 text-sm">

          </div>
        </div>
      );
    }

    // ============================================================
    // RESULTS SCREEN
    // ============================================================
    function RadarChartCanvas({ radarData }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        if (!canvasRef.current) return;
        if (chartRef.current) chartRef.current.destroy();

        chartRef.current = new Chart(canvasRef.current, {
          type: 'radar',
          data: {
            labels: radarData.map(d => d.axe),
            datasets: [{
              label: 'Score',
              data: radarData.map(d => d.score),
              backgroundColor: 'rgba(59,130,246,0.25)',
              borderColor: '#3b82f6',
              borderWidth: 2,
              pointBackgroundColor: '#3b82f6',
              pointBorderColor: '#3b82f6',
              pointRadius: 4,
            }],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              r: {
                beginAtZero: true,
                max: 100,
                ticks: { stepSize: 20, color: '#64748b', backdropColor: 'transparent', font: { size: 10 } },
                grid: { color: '#334155' },
                angleLines: { color: '#334155' },
                pointLabels: { color: '#94a3b8', font: { size: 11 } },
              },
            },
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: '#1e293b',
                borderColor: '#475569',
                borderWidth: 1,
                titleColor: '#e2e8f0',
                bodyColor: '#e2e8f0',
                cornerRadius: 8,
                callbacks: { label: (ctx) => `Score: ${ctx.raw}%` },
              },
            },
          },
        });

        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [radarData]);

      return React.createElement('canvas', { ref: canvasRef });
    }

    function ResultsScreen({ result, sessionId, onRestart }) {
      const [analyzing, setAnalyzing] = useState(false);
      const [analysisResult, setAnalysisResult] = useState(null);
      const [analysisError, setAnalysisError] = useState(null);

      if (!result) return null;

      const { overall_score, level, axes, feedback, points_forts, axes_a_developper } = result;
      const globalColor = scoreColor(overall_score);

      // Radar data
      const radarData = AXES_ORDER.map(a => ({
        axe: a.label,
        score: axes?.[a.key]?.score_pct ?? 0,
      }));

      // Derive forces/dev from axes data
      const forces = AXES_ORDER.filter(a => (axes?.[a.key]?.score_pct ?? 0) >= 60);
      const aDevelopper = AXES_ORDER.filter(a => (axes?.[a.key]?.score_pct ?? 0) < 60 && (axes?.[a.key]?.score_pct ?? 0) > 0);

      const handleAnalyze = async () => {
        setAnalyzing(true);
        setAnalysisError(null);
        try {
          const resp = await fetch("http://localhost:8003/api/voice/skills-gap", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session_id: sessionId }),
          });
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const data = await resp.json();
          setAnalysisResult(data);
        } catch (e) {
          setAnalysisError("Erreur lors de l'analyse: " + e.message);
        } finally {
          setAnalyzing(false);
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="max-w-2xl w-full fade-in space-y-5 py-8">
            {/* Header */}
            <div className="text-center">
              <h2 className="text-2xl font-bold mb-1">Resultats du Quiz</h2>
              <p className="text-slate-400">Votre profil de litteratie IA</p>
            </div>

            {/* Score global */}
            <div className="bg-ax5-card rounded-2xl p-6 border border-slate-700 text-center">
              <p className="text-6xl font-bold mb-2" style={{color: globalColor}}>{Math.round(overall_score)}%</p>
              <p className="text-xl font-semibold" style={{color: globalColor}}>{level}</p>
            </div>

            {/* Radar */}
            <div className="bg-ax5-card rounded-2xl p-4 border border-slate-700">
              <h3 className="text-center text-sm text-slate-400 mb-2">Radar des 6 axes</h3>
              <div style={{height: 320}}>
                <RadarChartCanvas radarData={radarData} />
              </div>
            </div>

            {/* Axes detail bars */}
            <div className="bg-ax5-card rounded-2xl p-6 border border-slate-700 space-y-3">
              <h3 className="text-sm text-slate-400 mb-2">Detail par axe</h3>
              {AXES_ORDER.map(a => {
                const sc = axes?.[a.key]?.score_pct ?? 0;
                const niv = axes?.[a.key]?.niveau ?? "\u2014";
                const barColor = scoreColor(sc);
                return (
                  <div key={a.key}>
                    <div className="flex justify-between text-sm mb-1">
                      <span className="text-slate-300 flex items-center gap-2">
                        <span>{a.icon}</span> {a.label}
                      </span>
                      <span style={{color:barColor}} className="font-semibold">{Math.round(sc)}% <span className="font-normal text-xs text-slate-500">({niv})</span></span>
                    </div>
                    <div className="h-2.5 bg-ax5-bg rounded-full overflow-hidden">
                      <div className="h-full rounded-full transition-all duration-700" style={{width:`${sc}%`, background:barColor}}/>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Resume / Feedback */}
            {feedback && (
              <div className="bg-ax5-card rounded-2xl p-6 border border-slate-700">
                <h3 className="text-sm text-slate-400 mb-2">Resume de l'assistant</h3>
                <p className="text-slate-200 text-sm leading-relaxed">{feedback}</p>
              </div>
            )}

            {/* Forces + A developper (derived from axes) */}
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
              {forces.length > 0 && (
                <div className="bg-ax5-card rounded-xl p-4 border border-green-900/50">
                  <h4 className="text-ax5-success text-sm font-semibold mb-2">Vos forces</h4>
                  <ul className="text-sm text-slate-300 space-y-1.5">
                    {forces.map(a => (
                      <li key={a.key} className="flex items-center gap-2">
                        <span className="text-ax5-success">+</span>
                        <span>{a.icon} {a.label} ({Math.round(axes?.[a.key]?.score_pct ?? 0)}%)</span>
                      </li>
                    ))}
                  </ul>
                </div>
              )}
              {aDevelopper.length > 0 && (
                <div className="bg-ax5-card rounded-xl p-4 border border-yellow-900/50">
                  <h4 className="text-ax5-warn text-sm font-semibold mb-2">Axes a developper</h4>
                  <ul className="text-sm text-slate-300 space-y-1.5">
                    {aDevelopper.map(a => (
                      <li key={a.key} className="flex items-center gap-2">
                        <span className="text-ax5-warn">\u2192</span>
                        <span>{a.icon} {a.label} ({Math.round(axes?.[a.key]?.score_pct ?? 0)}%)</span>
                      </li>
                    ))}
                  </ul>
                </div>
              )}
            </div>

            {/* Analysis result */}
            {analysisResult && (
              <div className="bg-ax5-card rounded-2xl p-6 border border-ax5-accent/30 fade-in">
                <h3 className="text-ax5-accent text-sm font-semibold mb-2">Analyse approfondie par Claude</h3>
                <p className="text-slate-200 text-sm leading-relaxed whitespace-pre-line">{analysisResult.analysis || JSON.stringify(analysisResult, null, 2)}</p>
              </div>
            )}
            {analysisError && (
              <div className="bg-red-900/20 border border-red-800/50 rounded-xl p-4 text-red-300 text-sm fade-in">
                {analysisError}
              </div>
            )}

            {/* Actions */}
            <div className="space-y-3">
              <button onClick={handleAnalyze} disabled={analyzing}
                className="w-full py-3.5 rounded-lg bg-ax5-accent text-white font-semibold hover:bg-blue-600 disabled:opacity-60 transition flex items-center justify-center gap-2">
                {analyzing
                  ? <><SpinnerIcon size={20}/> Analyse en cours par Claude...</>
                  : <><BrainIcon size={20}/> Analyser mes resultats en profondeur</>
                }
              </button>
              <button onClick={onRestart}
                className="w-full py-3 rounded-lg border border-slate-600 text-slate-300 hover:bg-slate-700 transition flex items-center justify-center gap-2 text-sm">
                <RefreshIcon size={18}/> Refaire le quiz
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // MAIN APP
    // ============================================================
    function App() {
      const [screen, setScreen] = useState("welcome"); // welcome | quiz | results
      const [sessionId, setSessionId] = useState(null);
      const [transcripts, setTranscripts] = useState([]);
      const [questionNum, setQuestionNum] = useState(0);
      const [currentAxe, setCurrentAxe] = useState("Comprehension Technique IA");
      const [currentQuestionId, setCurrentQuestionId] = useState(null);
      const [elapsed, setElapsed] = useState(0);
      const [isGeminiSpeaking, setIsGeminiSpeaking] = useState(false);
      const [isPaused, setIsPaused] = useState(false);
      const [result, setResult] = useState(null);
      const [error, setError] = useState(null);
      const [scoreBadgeVisible, setScoreBadgeVisible] = useState(false);

      const wsRef = useRef(null);
      const audioRef = useRef(null);
      const timerRef = useRef(null);
      const badgeTimerRef = useRef(null);

      // Timer
      useEffect(() => {
        if (screen === "quiz" && !isPaused) {
          timerRef.current = setInterval(() => setElapsed(e => e + 1), 1000);
          return () => clearInterval(timerRef.current);
        } else {
          clearInterval(timerRef.current);
        }
      }, [screen, isPaused]);

      // Cleanup on unmount
      useEffect(() => () => { cleanup(); }, []);

      const cleanup = useCallback(() => {
        if (wsRef.current) { try { wsRef.current.close(); } catch(e){} wsRef.current = null; }
        if (audioRef.current) { audioRef.current.stop(); audioRef.current = null; }
        clearInterval(timerRef.current);
        clearTimeout(badgeTimerRef.current);
      }, []);

      const showScoreBadge = useCallback(() => {
        setScoreBadgeVisible(true);
        clearTimeout(badgeTimerRef.current);
        badgeTimerRef.current = setTimeout(() => setScoreBadgeVisible(false), 2500);
      }, []);

      // ---- START QUIZ ----
      const handleStart = useCallback(async (userId, language) => {
        setError(null);
        setTranscripts([]);
        setQuestionNum(0);
        setElapsed(0);
        setResult(null);
        setIsGeminiSpeaking(false);
        setIsPaused(false);
        setCurrentQuestionId(null);
        setScoreBadgeVisible(false);

        try {
          // WebSocket
          const ws = new WebSocket(WS_URL);
          wsRef.current = ws;

          ws.onopen = () => {
            ws.send(JSON.stringify({ user_id: userId, language }));
          };

          ws.onmessage = (evt) => {
            if (evt.data instanceof Blob) {
              // Audio from Gemini
              setIsGeminiSpeaking(true);
              evt.data.arrayBuffer().then(buf => {
                if (audioRef.current) audioRef.current.enqueuePlayback(buf);
              });
              return;
            }
            // JSON message
            try {
              const msg = JSON.parse(evt.data);
              handleServerMessage(msg);
            } catch(e) {
              console.warn("Non-JSON message:", evt.data);
            }
          };

          ws.onerror = (e) => {
            console.error("WS error:", e);
            setError("Erreur de connexion WebSocket. Verifiez que le serveur tourne sur le port 8003.");
          };

          ws.onclose = (e) => {
            console.log("WS closed:", e.code, e.reason);
          };

          // Audio capture
          const audio = new AudioEngine((chunk) => {
            if (wsRef.current?.readyState === WebSocket.OPEN && !isPaused) {
              wsRef.current.send(chunk);
            }
          });
          audioRef.current = audio;
          await audio.startCapture();

          setScreen("quiz");

        } catch (err) {
          console.error("Start error:", err);
          if (err.name === 'NotAllowedError') {
            setError("Acces au microphone refuse. Autorisez le microphone et reessayez.");
          } else {
            setError("Erreur: " + err.message);
          }
        }
      }, [isPaused]);

      // ---- HANDLE SERVER MESSAGES ----
      const handleServerMessage = useCallback((msg) => {
        switch (msg.type) {
          case "session_started":
            setSessionId(msg.session_id);
            break;

          case "transcript":
            setIsGeminiSpeaking(false);
            setTranscripts(prev => {
              // Merge consecutive gemini transcripts
              if (prev.length > 0 && prev[prev.length-1].role === 'gemini') {
                const updated = [...prev];
                updated[updated.length-1] = { ...updated[updated.length-1], text: updated[updated.length-1].text + msg.text };
                return updated;
              }
              return [...prev, { role: 'gemini', text: msg.text }];
            });
            break;

          case "turn_complete":
            setIsGeminiSpeaking(false);
            // Next transcript from user side
            setTranscripts(prev => [...prev, { role: 'user', text: '(ecoute...)' }]);
            break;

          case "tool_call_processed":
            if (msg.function === "score_response" && msg.result) {
              const qNum = msg.result.question_number || 0;
              setQuestionNum(qNum);
              const qId = msg.result.question_id || "";
              setCurrentQuestionId(qId);
              setCurrentAxe(axeLabelFromId(qId));
              showScoreBadge();
              // Remove the "(ecoute...)" placeholder if present
              setTranscripts(prev => {
                if (prev.length > 0 && prev[prev.length-1].text === '(ecoute...)') {
                  return prev.slice(0, -1);
                }
                return prev;
              });
            }
            if (msg.function === "finalize_quiz" && msg.result) {
              handleQuizCompleted(msg.result);
            }
            break;

          case "error":
            setError(msg.message);
            break;

          default:
            console.log("Unknown message type:", msg.type, msg);
        }
      }, []);

      const handleQuizCompleted = useCallback((finalResult) => {
        const fetchResults = async () => {
          try {
            const resp = await fetch(`http://localhost:8003/api/voice/sessions/${sessionId}`);
            const data = await resp.json();
            setResult({
              overall_score: finalResult.overall_score ?? data.score_global_pct ?? 0,
              level: finalResult.level ?? data.niveau_global ?? "\u2014",
              axes: buildAxesMap(data.axes_partiels || {}),
              feedback: data.summary || data.participant_feedback || "",
              points_forts: data.points_forts || [],
              axes_a_developper: data.axes_a_developper || [],
            });
          } catch (e) {
            // Fallback: use what we have
            setResult({
              overall_score: finalResult.overall_score ?? 0,
              level: finalResult.level ?? "\u2014",
              axes: {},
              feedback: "",
              points_forts: [],
              axes_a_developper: [],
            });
          }
          cleanup();
          setScreen("results");
        };
        fetchResults();
      }, [sessionId, cleanup]);

      const buildAxesMap = (partiels) => {
        const map = {};
        const keyMap = {
          "Compr. Technique IA":"comprehension_technique_ia",
          "Comprehension Technique IA":"comprehension_technique_ia",
          "Usage Operationnel":"usage_operationnel",
          "Pensee Critique":"pensee_critique",
          "Ethique & Conformite":"ethique_conformite",
          "Collaboration Humain-IA":"collaboration_humain_ia",
          "Collab. Humain-IA":"collaboration_humain_ia",
          "Apprentissage Continu":"apprentissage_continu",
        };
        for (const [label, data] of Object.entries(partiels)) {
          const key = keyMap[label];
          if (key && data) {
            const brut = data.score_brut_partiel || 0;
            const pct = Math.round((brut / 60) * 100);
            const niveau = pct >= 80 ? "Expert" : pct >= 60 ? "Avance" : pct >= 40 ? "Intermediaire" : pct >= 20 ? "Debutant" : "Novice";
            map[key] = { score_pct: pct, niveau };
          }
        }
        return map;
      };

      // ---- PAUSE / STOP ----
      const handlePause = () => setIsPaused(p => !p);

      const handleStop = useCallback(() => {
        if (wsRef.current?.readyState === WebSocket.OPEN) {
          wsRef.current.send(JSON.stringify({ type: "stop" }));
        }
        cleanup();
        setScreen("welcome");
      }, [cleanup]);

      const handleRestart = useCallback(() => {
        cleanup();
        setResult(null);
        setScreen("welcome");
      }, [cleanup]);

      // ---- RENDER ----
      return (
        <div className="min-h-screen">
          {error && (
            <div className="fixed top-4 left-1/2 -translate-x-1/2 bg-red-900/90 border border-red-700 text-red-200 px-5 py-3 rounded-xl z-50 max-w-md text-sm text-center fade-in">
              {error}
              <button onClick={() => setError(null)} className="ml-3 text-red-400 hover:text-white">x</button>
            </div>
          )}

          {screen === "welcome" && <WelcomeScreen onStart={handleStart} />}
          {screen === "quiz" && (
            <QuizScreen
              sessionId={sessionId}
              transcripts={transcripts}
              questionNum={questionNum}
              currentAxe={currentAxe}
              currentQuestionId={currentQuestionId}
              elapsed={elapsed}
              isGeminiSpeaking={isGeminiSpeaking}
              isPaused={isPaused}
              scoreBadgeVisible={scoreBadgeVisible}
              onPause={handlePause}
              onStop={handleStop}
            />
          )}
          {screen === "results" && <ResultsScreen result={result} sessionId={sessionId} onRestart={handleRestart} />}
        </div>
      );
    }

    // ============================================================
    // MOUNT
    // ============================================================
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
